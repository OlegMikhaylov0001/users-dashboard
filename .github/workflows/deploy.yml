name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          # Sets basePath to "/repo-name" automatically.
          # If this is a user/org page (username.github.io), change to an empty string.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Cloudflare Worker proxy URL for the keyless demo provider.
          # When unset, the "Demo" provider is hidden from the UI.
          NEXT_PUBLIC_DEMO_WORKER_URL: ${{ vars.NEXT_PUBLIC_DEMO_WORKER_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ── Deploy (main branch only) ──────────────────────────────────────────────
  deploy:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
